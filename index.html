<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Date Quest">
<title>Date Quest</title>
<style>
:root {
  --bg:       #EFE6DF;
  --surface:  #FAF7F4;
  --surface2: #E8DED7;
  --border:   #D8CEC6;
  --text:     #2A2018;
  --text2:    #7A6E66;
  --text3:    #B0A49C;
  --red:      #C8392A;
  --red-lt:   #F5E6E4;
  --gold:     #C4902A;
  --gold-lt:  #F5ECD8;
  --green:    #1A7A4A;
  --green-lt: #DFF0E8;
  --blue:     #2A5F90;
  --blue-lt:  #DDE8F4;
  --plum:     #7A2A5A;
  --plum-lt:  #F0DDE8;
  --teal:     #1A6070;
  --teal-lt:  #DCF0F4;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}

/* Header */
.app-header{padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);}
.app-title{font-size:19px;font-weight:700;letter-spacing:-0.3px;color:var(--text);}
.app-sub{font-size:11px;color:var(--text2);margin-top:1px;}

/* Stats */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);padding:10px 14px;gap:7px;flex-shrink:0;background:var(--bg);}
.stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:8px 10px;}
.stat-val{font-size:21px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-top:2px;}

/* Tabs */
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 14px;}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.tab.active{color:var(--red);border-bottom-color:var(--red);}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
.content::-webkit-scrollbar{display:none;}
.section{display:none;padding:12px 13px calc(var(--safe-bot) + 80px);}
.section.active{display:block;}

/* Goal cards */
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:14px;margin-bottom:9px;position:relative;overflow:hidden;}
.delete-reveal{position:absolute;right:0;top:0;bottom:0;width:68px;display:flex;align-items:center;justify-content:center;background:#C8392A;border-radius:0 15px 15px 0;cursor:pointer;opacity:0;transition:opacity .2s;pointer-events:none;}
.delete-reveal svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;}
.goal-card.swiping-left .delete-reveal{opacity:1;pointer-events:auto;}
.goal-card.swiping-left .goal-card-inner{transform:translateX(-68px);transition:transform .2s;}
.goal-card-inner{transition:transform .2s;}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;gap:9px;}
.goal-icon-wrap{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.goal-icon-wrap svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.goal-meta{flex:1;min-width:0;}
.goal-name{font-size:13px;font-weight:700;line-height:1.25;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.goal-target-lbl{font-size:10px;color:var(--text2);margin-top:2px;}
.edit-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:10px;font-weight:600;padding:4px 8px;cursor:pointer;flex-shrink:0;}
.bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.bar-fill{height:100%;border-radius:3px;transition:width .45s cubic-bezier(.4,0,.2,1);}
.bar-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:11px;}
.count-row{display:flex;align-items:center;justify-content:space-between;}
.count-controls{display:flex;align-items:center;gap:12px;}
.cnt-btn{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;user-select:none;}
.cnt-btn:active{background:var(--border);}
.cnt-num{font-size:17px;font-weight:700;min-width:22px;text-align:center;}
.goal-complete{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:5px;}

/* color themes */
.gc-red   .goal-icon-wrap{background:var(--red-lt);color:var(--red);}   .gc-red   .bar-fill{background:var(--red);}   .gc-red   .goal-complete{background:var(--red-lt);color:var(--red);}
.gc-gold  .goal-icon-wrap{background:var(--gold-lt);color:var(--gold);}  .gc-gold  .bar-fill{background:var(--gold);}  .gc-gold  .goal-complete{background:var(--gold-lt);color:var(--gold);}
.gc-green .goal-icon-wrap{background:var(--green-lt);color:var(--green);}.gc-green .bar-fill{background:var(--green);}.gc-green .goal-complete{background:var(--green-lt);color:var(--green);}
.gc-blue  .goal-icon-wrap{background:var(--blue-lt);color:var(--blue);}  .gc-blue  .bar-fill{background:var(--blue);}  .gc-blue  .goal-complete{background:var(--blue-lt);color:var(--blue);}
.gc-plum  .goal-icon-wrap{background:var(--plum-lt);color:var(--plum);}  .gc-plum  .bar-fill{background:var(--plum);}  .gc-plum  .goal-complete{background:var(--plum-lt);color:var(--plum);}
.gc-teal  .goal-icon-wrap{background:var(--teal-lt);color:var(--teal);}  .gc-teal  .bar-fill{background:var(--teal);}  .gc-teal  .goal-complete{background:var(--teal-lt);color:var(--teal);}

/* Add goal */
.add-goal-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:13px;border:1.5px dashed var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;margin-top:2px;}
.add-goal-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

/* Calendar outer */
#cal-outer{display:none;flex-direction:column;flex:1;overflow:hidden;background:var(--bg);}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.leg-swatch{width:9px;height:9px;border-radius:2px;}
#cal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#cal-months{padding:12px 13px calc(var(--safe-bot,0px) + 80px);}
.cal-month-block{margin-bottom:24px;}
.cal-month-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--text3);}
.cal-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;color:var(--text2);position:relative;background:transparent;transition:background .1s;flex-direction:column;gap:1px;}
.cal-day:active{opacity:.65;}
.cal-day.today{border-color:var(--red);color:var(--red);font-weight:700;}
.cal-day.future{color:var(--text3);cursor:default;}
.cal-day.has-swipe{background:var(--blue-lt);color:var(--blue);}
.cal-day.has-date{background:var(--red-lt);color:var(--red);border-color:rgba(200,57,42,.2);}
.cal-star{position:absolute;top:2px;left:2px;}
.cal-star svg{width:6px;height:6px;}
.cal-name{font-size:7px;font-weight:600;line-height:1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px;}
.cal-day-num{line-height:1;}
/* per-person colors */
.pc-1{background:#F5E6E4!important;color:#C8392A!important;border-color:rgba(200,57,42,.25)!important;}
.pc-2{background:#F5ECD8!important;color:#C4902A!important;border-color:rgba(196,144,42,.25)!important;}
.pc-3{background:#DDE8F4!important;color:#2A5F90!important;border-color:rgba(42,95,144,.25)!important;}
.pc-4{background:#DFF0E8!important;color:#1A7A4A!important;border-color:rgba(26,122,74,.25)!important;}
.pc-5{background:#F0DDE8!important;color:#7A2A5A!important;border-color:rgba(122,42,90,.25)!important;}
.pc-6{background:#DCF0F4!important;color:#1A6070!important;border-color:rgba(26,96,112,.25)!important;}
.pc-7{background:#EDE8F5!important;color:#4A2A8A!important;border-color:rgba(74,42,138,.25)!important;}
.pc-8{background:#F5EDE4!important;color:#7A4A1A!important;border-color:rgba(122,74,26,.25)!important;}

/* Log modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,32,24,.3);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:18px 20px calc(var(--safe-bot) + 20px);width:100%;border-top:1px solid var(--border);max-height:88vh;overflow-y:auto;}
.modal-handle{width:30px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.log-panel-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em;}
.log-btns{display:flex;flex-direction:column;gap:6px;}
.log-btn{padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;}
.log-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.log-check{margin-left:auto;font-size:12px;font-weight:700;}
.log-btn.on-swipe{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);}
.log-btn.on-date{background:var(--red-lt);border-color:var(--red);color:var(--red);}
.log-btn.on-first{background:var(--gold-lt);border-color:var(--gold);color:var(--gold);}
.with-who-row{display:flex;align-items:center;gap:7px;margin-top:7px;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;}
.with-who-row svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.with-who-row input{flex:1;border:none;background:transparent;font-size:13px;color:var(--text);outline:none;}
.with-who-row input::placeholder{color:var(--text3);}
.log-done{margin-top:9px;width:100%;padding:11px;border-radius:9px;background:var(--red);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}

/* Goal modal */
.modal-field{margin-bottom:12px;}
.modal-field label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;}
.modal-field input[type=text],.modal-field input[type=number],.modal-field input[type=date]{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:15px;font-weight:500;outline:none;-webkit-appearance:none;appearance:none;}
.modal-field input:focus{border-color:var(--red);}
.color-picker{display:flex;gap:7px;flex-wrap:wrap;}
.color-opt{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .1s;}
.color-opt.selected{border-color:var(--text);}
.modal-btns{display:flex;gap:7px;margin-top:2px;}
.btn-cancel{flex:1;padding:12px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;}
.btn-save{flex:2;padding:12px;border-radius:9px;background:var(--red);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.btn-delete{width:100%;padding:12px;border-radius:9px;background:transparent;border:1.5px solid #C8392A;color:#C8392A;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;}

/* Date prompt in goal modal */
.date-prompt{background:var(--gold-lt);border:1.5px solid var(--gold);border-radius:9px;padding:10px 12px;margin-top:10px;font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:7px;}
.date-prompt svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0;}

/* Share FAB */
.share-fab{position:fixed;bottom:calc(var(--safe-bot) + 14px);right:14px;background:var(--red);color:#fff;border:none;border-radius:13px;padding:11px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(200,57,42,.35);z-index:50;}
.share-fab svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Share modal */
.share-option{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;margin-bottom:8px;}
.share-option-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.share-option-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.share-option-text{flex:1;}
.share-option-label{font-size:13px;font-weight:700;color:var(--text);}
.share-option-desc{font-size:11px;color:var(--text2);margin-top:1px;}

/* Toast */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 70px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);border-radius:18px;padding:8px 14px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Print / share page */
@media print{
  .app,.share-fab,.modal-overlay,.toast{display:none!important;}
  #print-page{display:block!important;}
}
#print-page{display:none;position:fixed;inset:0;background:#EFE6DF;z-index:500;overflow-y:auto;padding:0;}
.print-inner{max-width:680px;margin:0 auto;padding:32px 28px;background:#FAF7F4;min-height:100vh;}
.print-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;border-bottom:2px solid #D8CEC6;padding-bottom:16px;}
.print-title{font-size:22px;font-weight:800;color:#2A2018;letter-spacing:-.3px;}
.print-subtitle{font-size:12px;color:#7A6E66;margin-top:3px;}
.print-dates{font-size:11px;color:#7A6E66;text-align:right;}
.print-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7A6E66;margin:20px 0 10px;}
.print-goals{display:flex;flex-direction:column;gap:10px;}
.print-goal{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #D8CEC6;}
.print-goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.print-goal-name{font-size:13px;font-weight:700;color:#2A2018;}
.print-goal-count{font-size:13px;font-weight:700;}
.print-bar-track{height:8px;background:#E8DED7;border-radius:4px;overflow:hidden;margin-bottom:4px;}
.print-bar-fill{height:100%;border-radius:4px;}
.print-bar-pct{font-size:10px;color:#7A6E66;}
.print-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.print-stat{background:#fff;border:1px solid #D8CEC6;border-radius:9px;padding:10px 12px;text-align:center;}
.print-stat-val{font-size:26px;font-weight:800;color:#2A2018;}
.print-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#7A6E66;font-weight:600;margin-top:2px;}
/* print cal */
.print-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.print-cal-dow{text-align:center;font-size:9px;font-weight:700;color:#B0A49C;padding:2px 0;}
.print-cal-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:1px solid transparent;color:#7A6E66;position:relative;flex-direction:column;gap:1px;}
.print-cal-day.p-today{border-color:#C8392A;color:#C8392A;font-weight:700;}
.print-cal-day.p-swipe{background:#DDE8F4;color:#2A5F90;}
.print-cal-day.p-date{background:#F5E6E4;color:#C8392A;border-color:rgba(200,57,42,.2);}
.print-cal-day.p-pc-1{background:#F5E6E4;color:#C8392A;}
.print-cal-day.p-pc-2{background:#F5ECD8;color:#C4902A;}
.print-cal-day.p-pc-3{background:#DDE8F4;color:#2A5F90;}
.print-cal-day.p-pc-4{background:#DFF0E8;color:#1A7A4A;}
.print-cal-day.p-pc-5{background:#F0DDE8;color:#7A2A5A;}
.print-cal-day.p-pc-6{background:#DCF0F4;color:#1A6070;}
.print-cal-star{position:absolute;top:1px;left:2px;}
.print-cal-name{font-size:6px;font-weight:600;line-height:1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.print-month-label{font-size:11px;font-weight:700;color:#7A6E66;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.print-close-btn{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);right:14px;background:var(--red);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;z-index:600;}
.print-cal-months{display:flex;flex-direction:column;gap:18px;}
.print-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.print-leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#7A6E66;}
.print-leg-dot{width:8px;height:8px;border-radius:2px;}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">Date Quest</div>
    <div class="app-sub">Track your dating goals</div>
  </div>
  <div class="stats-strip">
    <div class="stat-cell"><div class="stat-val" id="s-total" style="color:var(--red)">0</div><div class="stat-lbl">Total dates</div></div>
    <div class="stat-cell"><div class="stat-val" id="s-first" style="color:var(--gold)">0</div><div class="stat-lbl">First dates</div></div>
    <div class="stat-cell"><div class="stat-val" id="s-swipe" style="color:var(--blue)">0</div><div class="stat-lbl">Swipe days</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-btn-goals" onclick="switchTab('goals')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>Goals
    </button>
    <button class="tab" id="tab-btn-calendar" onclick="switchTab('calendar')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>Calendar
    </button>
  </div>
  <div class="content" id="main-content">
    <div class="section active" id="tab-goals">
      <div id="goals-list"></div>
      <button class="add-goal-btn" onclick="openAddGoal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add goal
      </button>
    </div>
    <div class="section" id="tab-calendar"></div>
  </div>
</div>

<!-- Calendar outer (separate from scrollable content so legend sticks) -->
<div id="cal-outer">
  <div class="cal-legend">
    <div class="leg"><div class="leg-swatch" style="background:var(--blue-lt);border:1px solid var(--blue)"></div>Swiped</div>
    <div class="leg"><div class="leg-swatch" style="background:var(--red-lt);border:1px solid var(--red)"></div>Date</div>
    <div class="leg" style="align-items:center;">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="var(--gold)" stroke="var(--gold)" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      First date
    </div>
  </div>
  <div id="cal-scroll"><div id="cal-months"></div></div>
</div>

<!-- Log modal -->
<div class="modal-overlay" id="log-overlay" onclick="handleLogBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="log-panel-title" id="log-panel-title">Log for —</div>
    <div class="log-btns">
      <button class="log-btn" id="lbtn-swipe" onclick="toggleCal('swipe')">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18" stroke-width="2.5"/></svg>
        Swiped on apps<span class="log-check" id="lcheck-swipe"></span>
      </button>
      <button class="log-btn" id="lbtn-date" onclick="toggleCal('date')">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Went on a date<span class="log-check" id="lcheck-date"></span>
      </button>
      <button class="log-btn" id="lbtn-first" onclick="toggleCal('first')">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        First date<span class="log-check" id="lcheck-first"></span>
      </button>
      <div class="with-who-row" id="with-who-row" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="with-who-input" placeholder="With who? (optional)" maxlength="20" oninput="saveWhoInput()">
      </div>
    </div>
    <button class="log-done" onclick="closeLog()">Done</button>
  </div>
</div>

<!-- Goal modal (add / edit) -->
<div class="modal-overlay" id="goal-modal" onclick="handleGoalModalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="goal-modal-title">Edit goal</div>
    <div class="modal-field"><label>Goal name</label><input type="text" id="gm-name" placeholder="e.g. Total dates this summer" maxlength="40"></div>
    <div class="modal-field"><label>Target</label><input type="number" id="gm-target" min="1" max="999" inputmode="numeric"></div>
    <div class="modal-field"><label>Color</label><div class="color-picker" id="color-picker"></div></div>
    <!-- Date prompt shown after adding a count -->
    <div class="date-prompt" id="date-prompt" style="display:none">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      <span>When did this happen?</span>
    </div>
    <div class="modal-field" id="date-field" style="display:none"><label>Date</label><input type="date" id="gm-date"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeGoalModal()">Cancel</button>
      <button class="btn-save" onclick="saveGoal()">Save</button>
    </div>
    <button class="btn-delete" id="gm-delete-btn" onclick="deleteGoal()" style="display:none">Delete this goal</button>
  </div>
</div>

<!-- Date picker modal -->
<div class="modal-overlay" id="date-picker-modal" onclick="if(event.target===this)closeDatePickerModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="dp-title">When did this happen?</div>
    <div style="font-size:12px;color:var(--text2);margin:-8px 0 14px;font-weight:600;" id="dp-subtitle"></div>

      <label>Date</label>
      <input type="date" id="dp-date">
    </div>
    <div class="modal-btns">

<!-- Print/share page -->
<div id="print-page">
  <button class="print-close-btn" onclick="closePrintPage()">✕ Close</button>
  <div class="print-inner" id="print-inner"></div>
</div>

<button class="share-fab" onclick="openShareModal()">
  <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share
</button>

<div class="toast" id="toast"></div>

<script>
const MONTHS_LONG=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['S','M','T','W','T','F','S'];
const PERSON_CLASSES=['pc-1','pc-2','pc-3','pc-4','pc-5','pc-6','pc-7','pc-8'];

const COLORS=[
  {id:'gc-red',   hex:'#C8392A'},
  {id:'gc-gold',  hex:'#C4902A'},
  {id:'gc-green', hex:'#1A7A4A'},
  {id:'gc-blue',  hex:'#2A5F90'},
  {id:'gc-plum',  hex:'#7A2A5A'},
  {id:'gc-teal',  hex:'#1A6070'},
];

const ICONS_SVG={
  heart:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  star:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  phone:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18" stroke-width="2.5"/></svg>`,
  target:`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/></svg>`,
};

let state={
  goals:[
    {id:'g1',label:'Total dates this summer',color:'gc-red',  icon:'heart', target:10,current:0},
    {id:'g2',label:'New first dates',         color:'gc-gold', icon:'star',  target:6, current:0},
    {id:'g3',label:'Swipe days',              color:'gc-blue', icon:'phone', target:20,current:0},
  ],
  calendar:{},
  selectedKey:null,
  editingGoalId:null,
  isAddingGoal:false,
  pendingDateGoalId:null,
  personColorMap:{},
  nextPersonColor:0,
};

function save(){try{localStorage.setItem('dq5',JSON.stringify({goals:state.goals,calendar:state.calendar,personColorMap:state.personColorMap,nextPersonColor:state.nextPersonColor}));}catch(e){}}
function load(){
  try{
    const raw=localStorage.getItem('dq5');
    if(!raw)return;
    const s=JSON.parse(raw);
    if(s.goals)state.goals=s.goals;
    if(s.calendar)state.calendar=s.calendar;
    if(s.personColorMap)state.personColorMap=s.personColorMap;
    if(s.nextPersonColor!=null)state.nextPersonColor=s.nextPersonColor;
  }catch(e){}
}

function personColor(name){
  if(!name)return'';
  const k=name.trim().toLowerCase();
  if(!state.personColorMap[k]){state.personColorMap[k]=PERSON_CLASSES[state.nextPersonColor%PERSON_CLASSES.length];state.nextPersonColor++;}
  return state.personColorMap[k];
}

// ── Tabs ──
function switchTab(tab){
  ['goals','calendar'].forEach(t=>{
    document.getElementById('tab-btn-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t==='goals'&&tab==='goals');
  });
  const calOuter=document.getElementById('cal-outer');
  const mainContent=document.getElementById('main-content');
  if(tab==='calendar'){calOuter.style.display='flex';mainContent.style.display='none';renderCalendar();}
  else{calOuter.style.display='none';mainContent.style.display='';}
}
(function(){document.querySelector('.app').appendChild(document.getElementById('cal-outer'));})();

// ── Derived counts from calendar ──
function calCounts(){
  let swipe=0,date=0,first=0;
  Object.values(state.calendar).forEach(d=>{if(d.swipe)swipe++;if(d.date)date++;if(d.first)first++;});
  return{swipe,date,first};
}

function updateStats(){
  const c=calCounts();
  document.getElementById('s-total').textContent=c.date;
  document.getElementById('s-first').textContent=c.first;
  document.getElementById('s-swipe').textContent=c.swipe;
}

// ── Goals ──
function renderGoals(){
  const list=document.getElementById('goals-list');
  list.innerHTML='';
  state.goals.forEach(g=>{
    const pct=Math.min(100,Math.round((g.current/g.target)*100));
    const done=g.current>=g.target;
    const el=document.createElement('div');
    el.className='goal-card '+g.color;
    el.dataset.id=g.id;
    el.innerHTML=`
      <div class="delete-reveal" onclick="confirmDelete('${g.id}')">
        <svg viewBox="0 0 24 24" width="19" height="19" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </div>
      <div class="goal-card-inner">
        <div class="goal-top">
          <div class="goal-icon-wrap">${ICONS_SVG[g.icon]||ICONS_SVG.target}</div>
          <div class="goal-meta">
            <div class="goal-name">${g.label}</div>
            <div class="goal-target-lbl">Target: ${g.target}</div>
          </div>
          <button class="edit-btn" onclick="openEditGoal('${g.id}')">Edit</button>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-meta"><span>${pct}%</span><span>${g.current} / ${g.target}</span></div>
        <div class="count-row">
          <div class="count-controls">
            <button class="cnt-btn" onclick="adjust('${g.id}',-1)">−</button>
            <span class="cnt-num">${g.current}</span>
            <button class="cnt-btn" onclick="adjust('${g.id}',1)">+</button>
          </div>
          ${done?`<span class="goal-complete">✓ Done</span>`:''}
        </div>
      </div>`;
    let startX=0;
    el.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-startX;
      if(dx<-20)el.classList.add('swiping-left');
      if(dx>10)el.classList.remove('swiping-left');
    },{passive:true});
    document.addEventListener('touchstart',e=>{if(!el.contains(e.target))el.classList.remove('swiping-left');},{passive:true});
    list.appendChild(el);
  });
  updateStats();
}

function adjust(id,delta){
  const g=state.goals.find(x=>x.id===id);
  if(!g)return;
  if(delta<0){
    // Decrement: just update count, no calendar prompt
    const prev=g.current;
    g.current=Math.max(0,g.current+delta);
    if(g.current===prev)return;
    save();renderGoals();
    return;
  }
  // Increment: ask which date before logging
  state.pendingDateGoalId=id;
  openDatePickerModal(id);
}

function openDatePickerModal(goalId){
  const g=state.goals.find(x=>x.id===goalId);
  if(!g)return;
  // Set default to today
  const today=new Date();
  document.getElementById('dp-date').value=fmtDate(today);
  document.getElementById('dp-title').textContent='When did this happen?';
  document.getElementById('dp-subtitle').textContent=g.label;
  document.getElementById('date-picker-modal').classList.add('open');
}

function confirmDatePick(){
  const val=document.getElementById('dp-date').value;
  if(!val){showToast('Please pick a date');return;}
  const picked=new Date(val+'T00:00:00');
  const today=new Date();today.setHours(0,0,0,0);
  if(picked>today){showToast('Date can\'t be in the future');return;}

  const goalId=state.pendingDateGoalId;
  const g=state.goals.find(x=>x.id===goalId);
  if(!g)return;

  // Increment goal count
  const prev=g.current;
  g.current=g.current+1;
  if(prev<g.target&&g.current>=g.target)showToast('Goal reached: '+g.label+'!');

  // Log to calendar
  const key=dkey(picked.getFullYear(),picked.getMonth(),picked.getDate());
  if(!state.calendar[key])state.calendar[key]={};
  if(g.icon==='phone'){state.calendar[key].swipe=true;}
  else if(g.icon==='heart'||g.icon==='target'){state.calendar[key].date=true;}
  else if(g.icon==='star'){state.calendar[key].date=true;state.calendar[key].first=true;}

  closeDatePickerModal();

  // Now open the log panel for that day so user can add name etc.
  state.selectedKey=key;
  const mn=picked.getMonth(),dy=picked.getDate();
  document.getElementById('log-panel-title').textContent=`${MONTHS_LONG[mn]} ${dy}`;
  refreshLogBtns();
  document.getElementById('log-overlay').classList.add('open');

  syncGoalsFromCalendar();
  save();renderGoals();
}

function closeDatePickerModal(){
  document.getElementById('date-picker-modal').classList.remove('open');
  state.pendingDateGoalId=null;
}

// ── Goal modal ──
function buildColorPicker(sel){
  const p=document.getElementById('color-picker');
  p.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('button');
    b.className='color-opt'+(c.id===sel?' selected':'');
    b.style.background=c.hex;
    b.onclick=()=>{p.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');};
    p.appendChild(b);
  });
}
function openEditGoal(id){
  const g=state.goals.find(x=>x.id===id);if(!g)return;
  state.editingGoalId=id;state.isAddingGoal=false;
  document.getElementById('goal-modal-title').textContent='Edit goal';
  document.getElementById('gm-name').value=g.label;
  document.getElementById('gm-target').value=g.target;
  document.getElementById('gm-delete-btn').style.display='';
  document.getElementById('date-prompt').style.display='none';
  document.getElementById('date-field').style.display='none';
  buildColorPicker(g.color);
  document.getElementById('goal-modal').classList.add('open');
}
function openAddGoal(){
  state.editingGoalId=null;state.isAddingGoal=true;
  document.getElementById('goal-modal-title').textContent='New goal';
  document.getElementById('gm-name').value='';
  document.getElementById('gm-target').value='10';
  document.getElementById('gm-delete-btn').style.display='none';
  document.getElementById('date-prompt').style.display='none';
  document.getElementById('date-field').style.display='none';
  buildColorPicker('gc-red');
  document.getElementById('goal-modal').classList.add('open');
  setTimeout(()=>document.getElementById('gm-name').focus(),150);
}
function closeGoalModal(){document.getElementById('goal-modal').classList.remove('open');}
function handleGoalModalBg(e){if(e.target===document.getElementById('goal-modal'))closeGoalModal();}
function saveGoal(){
  const name=document.getElementById('gm-name').value.trim();
  const target=parseInt(document.getElementById('gm-target').value,10);
  if(!name||!target||target<1){showToast('Please fill in all fields');return;}
  const sel=document.querySelector('#color-picker .color-opt.selected');
  const colorId=sel?COLORS.find(c=>c.hex===sel.style.background)?.id||'gc-red':'gc-red';
  if(state.isAddingGoal){
    state.goals.push({id:'g'+Date.now(),label:name,color:colorId,icon:'target',target,current:0});
    showToast('Goal added');
  } else {
    const g=state.goals.find(x=>x.id===state.editingGoalId);
    if(g){g.label=name;g.target=target;g.color=colorId;}
    showToast('Goal updated');
  }
  save();closeGoalModal();renderGoals();
}
function deleteGoal(){
  if(!state.editingGoalId)return;
  state.goals=state.goals.filter(x=>x.id!==state.editingGoalId);
  save();closeGoalModal();renderGoals();showToast('Goal deleted');
}
function confirmDelete(id){
  state.editingGoalId=id;state.isAddingGoal=false;
  const g=state.goals.find(x=>x.id===id);if(!g)return;
  document.getElementById('goal-modal-title').textContent='Delete "'+g.label+'"?';
  document.getElementById('gm-name').value=g.label;
  document.getElementById('gm-target').value=g.target;
  document.getElementById('gm-delete-btn').style.display='';
  document.getElementById('date-prompt').style.display='none';
  document.getElementById('date-field').style.display='none';
  buildColorPicker(g.color);
  document.getElementById('goal-modal').classList.add('open');
}

// ── Calendar ──
function dkey(y,m,d){return`${y}-${m}-${d}`;}

function renderCalendar(){
  const container=document.getElementById('cal-months');
  container.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  for(let offset=-2;offset<=4;offset++){
    const d=new Date(today.getFullYear(),today.getMonth()+offset,1);
    const y=d.getFullYear(),m=d.getMonth();
    const block=document.createElement('div');
    block.className='cal-month-block';
    if(offset===0)block.id='cal-current-month';
    const firstDow=new Date(y,m,1).getDay();
    const dim=new Date(y,m+1,0).getDate();
    let html=`<div class="cal-month-label">${MONTHS_LONG[m]} ${y}</div>`;
    html+=`<div class="cal-dow-row">${DOW.map(x=>`<div class="cal-dow">${x}</div>`).join('')}</div>`;
    html+=`<div class="cal-days-grid">`;
    for(let i=0;i<firstDow;i++)html+=`<div></div>`;
    for(let day=1;day<=dim;day++){
      const key=dkey(y,m,day);
      const cal=state.calendar[key]||{};
      const thisDate=new Date(y,m,day);
      const isToday=thisDate.getTime()===today.getTime();
      const isFuture=thisDate>today;
      let cls='cal-day';
      if(isToday)cls+=' today';
      if(isFuture){cls+=' future';}
      else{
        if(cal.date&&cal.person){cls+=' '+personColor(cal.person);}
        else if(cal.date){cls+=' has-date';}
        else if(cal.swipe){cls+=' has-swipe';}
      }
      const star=cal.first?`<span class="cal-star"><svg viewBox="0 0 24 24" width="6" height="6" fill="var(--gold)" stroke="var(--gold)" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>`:'';
      const nm=cal.person&&cal.date?`<span class="cal-name">${cal.person}</span>`:'';
      if(isFuture){html+=`<div class="${cls}"><span class="cal-day-num">${day}</span></div>`;}
      else{html+=`<div class="${cls}" onclick="selectDay(${day},${m},${y},'${key}')">${star}<span class="cal-day-num">${day}</span>${nm}</div>`;}
    }
    html+=`</div>`;
    block.innerHTML=html;
    container.appendChild(block);
  }
  setTimeout(()=>{const c=document.getElementById('cal-current-month');if(c)c.scrollIntoView({block:'start',behavior:'auto'});},60);
}

function selectDay(day,month,year,key){
  state.selectedKey=key;
  document.getElementById('log-panel-title').textContent=`${MONTHS_LONG[month]} ${day}`;
  refreshLogBtns();
  document.getElementById('log-overlay').classList.add('open');
}

function refreshLogBtns(){
  const cal=state.calendar[state.selectedKey]||{};
  document.getElementById('lbtn-swipe').className='log-btn'+(cal.swipe?' on-swipe':'');
  document.getElementById('lcheck-swipe').textContent=cal.swipe?'✓':'';
  document.getElementById('lbtn-date').className='log-btn'+(cal.date?' on-date':'');
  document.getElementById('lcheck-date').textContent=cal.date?'✓':'';
  document.getElementById('lbtn-first').className='log-btn'+(cal.first?' on-first':'');
  document.getElementById('lcheck-first').textContent=cal.first?'✓':'';
  document.getElementById('with-who-row').style.display=cal.date?'flex':'none';
  document.getElementById('with-who-input').value=cal.person||'';
}

function toggleCal(type){
  const key=state.selectedKey;if(!key)return;
  if(!state.calendar[key])state.calendar[key]={};
  const cal=state.calendar[key];
  cal[type]=!cal[type];
  if(type==='date'&&!cal.date){cal.first=false;cal.person='';}
  if(type==='first'&&cal.first)cal.date=true;
  // Sync goal counts from calendar
  syncGoalsFromCalendar();
  save();refreshLogBtns();renderGoals();
}

function saveWhoInput(){
  const key=state.selectedKey;if(!key||!state.calendar[key])return;
  const name=document.getElementById('with-who-input').value.trim();
  state.calendar[key].person=name;
  if(name)personColor(name);
  save();
}

function closeLog(){
  saveWhoInput();
  document.getElementById('log-overlay').classList.remove('open');
  state.selectedKey=null;
  syncGoalsFromCalendar();
  save();renderGoals();renderCalendar();updateStats();
}
function handleLogBg(e){if(e.target===document.getElementById('log-overlay'))closeLog();}

// Sync calendar → goal counts for date/first/swipe goals
function syncGoalsFromCalendar(){
  const c=calCounts();
  // Map icon types to calendar counts
  state.goals.forEach(g=>{
    if(g.icon==='phone')g.current=c.swipe;
    else if(g.icon==='heart')g.current=c.date;
    else if(g.icon==='star')g.current=c.first;
  });
  updateStats();
}

// ── Share ──
function openShareModal(){document.getElementById('share-modal').classList.add('open');}
function closeShareModal(){document.getElementById('share-modal').classList.remove('open');}
function handleShareBg(e){if(e.target===document.getElementById('share-modal'))closeShareModal();}

function openCalRangePicker(){
  closeShareModal();
  // Default: current month
  const today=new Date();
  const y=today.getFullYear(),m=today.getMonth();
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  document.getElementById('range-from').value=fmtDate(first);
  document.getElementById('range-to').value=fmtDate(last);
  document.getElementById('range-modal').classList.add('open');
}
function closeRangeModal(){document.getElementById('range-modal').classList.remove('open');}
function handleRangeBg(e){if(e.target===document.getElementById('range-modal'))closeRangeModal();}
function fmtDate(d){return d.toISOString().slice(0,10);}

function openSharePage(type){
  closeShareModal();closeRangeModal();
  const page=document.getElementById('print-page');
  const inner=document.getElementById('print-inner');
  const today=new Date();
  const sharedOn=`${MONTHS_LONG[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;

  if(type==='goals'){
    const c=calCounts();
    let html=`
      <div class="print-header">
        <div><div class="print-title">Date Quest</div><div class="print-subtitle">Dating goals progress</div></div>
        <div class="print-dates">Shared ${sharedOn}</div>
      </div>
      <div class="print-section-title">Overview</div>
      <div class="print-stats">
        <div class="print-stat"><div class="print-stat-val" style="color:#C8392A">${c.date}</div><div class="print-stat-lbl">Total dates</div></div>
        <div class="print-stat"><div class="print-stat-val" style="color:#C4902A">${c.first}</div><div class="print-stat-lbl">First dates</div></div>
        <div class="print-stat"><div class="print-stat-val" style="color:#2A5F90">${c.swipe}</div><div class="print-stat-lbl">Swipe days</div></div>
      </div>
      <div class="print-section-title">Goals</div>
      <div class="print-goals">`;
    state.goals.forEach(g=>{
      const pct=Math.min(100,Math.round((g.current/g.target)*100));
      const colorMap={
        'gc-red':'#C8392A','gc-gold':'#C4902A','gc-green':'#1A7A4A',
        'gc-blue':'#2A5F90','gc-plum':'#7A2A5A','gc-teal':'#1A6070'
      };
      const col=colorMap[g.color]||'#C8392A';
      html+=`<div class="print-goal">
        <div class="print-goal-header">
          <div class="print-goal-name">${g.label}</div>
          <div class="print-goal-count" style="color:${col}">${g.current} / ${g.target}</div>
        </div>
        <div class="print-bar-track"><div class="print-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="print-bar-pct">${pct}% complete</div>
      </div>`;
    });
    html+=`</div>`;
    inner.innerHTML=html;

  } else {
    // Calendar view
    const fromVal=document.getElementById('range-from').value;
    const toVal=document.getElementById('range-to').value;
    const fromDate=fromVal?new Date(fromVal+'T00:00:00'):new Date();
    const toDate=toVal?new Date(toVal+'T00:00:00'):new Date();
    const fromLabel=`${MONTHS_LONG[fromDate.getMonth()]} ${fromDate.getDate()}, ${fromDate.getFullYear()}`;
    const toLabel=`${MONTHS_LONG[toDate.getMonth()]} ${toDate.getDate()}, ${toDate.getFullYear()}`;

    let html=`
      <div class="print-header">
        <div><div class="print-title">Date Quest</div><div class="print-subtitle">Calendar: ${fromLabel} – ${toLabel}</div></div>
        <div class="print-dates">Shared ${sharedOn}</div>
      </div>
      <div class="print-legend">
        <div class="print-leg"><div class="print-leg-dot" style="background:#DDE8F4;border:1px solid #2A5F90"></div>Swiped</div>
        <div class="print-leg"><div class="print-leg-dot" style="background:#F5E6E4;border:1px solid #C8392A"></div>Date</div>
        <div class="print-leg"><svg width="8" height="8" viewBox="0 0 24 24" fill="#C4902A" stroke="#C4902A" stroke-width="1" style="flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> First date</div>
      </div>
      <div class="print-cal-months">`;

    // Enumerate months in range
    let cur=new Date(fromDate.getFullYear(),fromDate.getMonth(),1);
    const endMonth=new Date(toDate.getFullYear(),toDate.getMonth(),1);
    while(cur<=endMonth){
      const y=cur.getFullYear(),m=cur.getMonth();
      const dim=new Date(y,m+1,0).getDate();
      const fdow=new Date(y,m,1).getDay();
      html+=`<div><div class="print-month-label">${MONTHS_LONG[m]} ${y}</div>`;
      html+=`<div class="print-cal-grid">`;
      DOW.forEach(d=>{html+=`<div class="print-cal-dow">${d}</div>`;});
      for(let i=0;i<fdow;i++)html+=`<div></div>`;
      for(let day=1;day<=dim;day++){
        const thisDate=new Date(y,m,day);
        if(thisDate<fromDate||thisDate>toDate){html+=`<div class="print-cal-day" style="opacity:.3">${day}</div>`;continue;}
        const key=dkey(y,m,day);
        const cal=state.calendar[key]||{};
        const todayD=new Date();todayD.setHours(0,0,0,0);
        const isToday=thisDate.getTime()===todayD.getTime();
        let cls='print-cal-day';
        if(isToday)cls+=' p-today';
        if(cal.date&&cal.person)cls+=' p-'+personColor(cal.person);
        else if(cal.date)cls+=' p-date';
        else if(cal.swipe)cls+=' p-swipe';
        const star=cal.first?`<span class="print-cal-star"><svg viewBox="0 0 24 24" width="5" height="5" fill="#C4902A" stroke="#C4902A" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>`:'';
        const nm=cal.person&&cal.date?`<span class="print-cal-name">${cal.person}</span>`:'';
        html+=`<div class="${cls}">${star}${day}${nm}</div>`;
      }
      html+=`</div></div>`;
      cur=new Date(y,m+1,1);
    }
    html+=`</div>`;
    inner.innerHTML=html;
  }

  page.style.display='block';
  showToast('Tap Share → Print to save as PDF');
}

function closePrintPage(){
  document.getElementById('print-page').style.display='none';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

load();
renderGoals();
</script>
</body>
</html>
